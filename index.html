<!DOCTYPE html>
<html lang="it">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Cacciaparole</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Inter', sans-serif;
      background: #08091a;
      color: #fff;
      user-select: none;
      /* Previene lo zoom su input mobile */
      touch-action: none;
    }

    /* Animated deep background */
    #bg-gradient {
      position: fixed;
      inset: 0;
      background: linear-gradient(135deg, #08091a 0%, #0f102e 40%, #0b1226 70%, #070818 100%);
      z-index: 0;
      pointer-events: none;
    }

    #bg-gradient::after {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 30%, rgba(80, 120, 255, 0.08) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 70%, rgba(150, 80, 255, 0.07) 0%, transparent 60%);
      animation: bgPulse 8s ease-in-out infinite alternate;
    }

    @keyframes bgPulse {
      from {
        opacity: 0.6;
      }

      to {
        opacity: 1;
      }
    }

    #canvas-container {
      position: fixed;
      inset: 0;
      z-index: 1;
    }

    /* ── UI TOP (Punteggi e Timer) ──────────────── */
    #top-bar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 20px;
      z-index: 40;
      pointer-events: none;
    }

    #game-stats {
      display: flex;
      flex-direction: column;
      gap: 4px;
      opacity: 0;
      transition: opacity 0.5s;
    }

    #game-stats.visible {
      opacity: 1;
    }

    .stat-badge {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 700;
      color: #aaccff;
    }

    #timer-display {
      font-size: clamp(30px, 7vw, 48px);
      font-weight: 900;
      letter-spacing: 2px;
      color: #fff;
      text-shadow: 0 2px 20px rgba(100, 180, 255, 0.5);
      display: none;
      transition: color 0.5s, text-shadow 0.5s;
    }

    #timer-display.warning {
      color: #ff5050;
      text-shadow: 0 2px 30px rgba(255, 80, 80, 0.8);
      animation: timerPulse 0.5s ease-in-out infinite alternate;
    }

    /* ── OVERLAYS (Countdown & Start) ──────────────── */
    #countdown-overlay {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 60;
      pointer-events: none;
    }

    #countdown-overlay.active {
      display: flex;
    }

    #countdown-num {
      font-size: clamp(120px, 30vw, 240px);
      font-weight: 900;
      color: #fff;
      text-shadow: 0 0 60px rgba(120, 180, 255, 0.9), 0 0 120px rgba(80, 140, 255, 0.5);
      opacity: 0;
      transform: scale(1.6);
      letter-spacing: -4px;
    }

    #start-prompt {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 30;
      pointer-events: all;
      cursor: pointer;
    }

    #start-prompt-inner {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      padding: 32px 40px;
      background: rgba(10, 12, 30, 0.75);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 24px;
      backdrop-filter: blur(16px);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.1);
      animation: promptFloat 3s ease-in-out infinite;
      text-align: center;
    }

    @keyframes promptFloat {

      0%,
      100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-8px);
      }
    }

    .prompt-dice {
      font-size: 52px;
      filter: drop-shadow(0 0 16px rgba(120, 180, 255, 0.6));
    }

    .prompt-title {
      font-size: clamp(22px, 5vw, 34px);
      font-weight: 900;
      letter-spacing: -1px;
    }

    .prompt-sub {
      font-size: 14px;
      color: rgba(255, 255, 255, 0.6);
    }

    .btn-large {
      width: 100%;
      background: linear-gradient(135deg, #4f7df5 0%, #7b52f0 100%);
      border: none;
      color: #fff;
      border-radius: 14px;
      padding: 14px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(80, 120, 255, 0.35);
      transition: transform 0.1s, filter 0.2s;
      font-family: 'Inter', sans-serif;
    }

    .btn-large:active {
      transform: scale(0.95);
    }

    /* ── WORD BAR (Swipe Mode) ──────────────────── */
    #word-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(8, 9, 26, 0.88);
      backdrop-filter: blur(20px);
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      padding: 10px 15px calc(10px + env(safe-area-inset-bottom));
      z-index: 50;
      display: none;
      flex-direction: column;
      gap: 8px;
      transform: translateY(100%);
      transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    #word-bar.visible {
      display: flex;
      transform: translateY(0);
    }

    /* Live swipe path display */
    #swipe-word-display {
      text-align: center;
      font-size: clamp(22px, 6vw, 32px);
      font-weight: 900;
      letter-spacing: 4px;
      color: #fff;
      min-height: 38px;
      text-shadow: 0 0 20px rgba(100, 200, 255, 0.7);
      transition: color 0.15s;
    }

    #swipe-word-display.invalid {
      color: #ff5050;
      text-shadow: 0 0 20px rgba(255, 80, 80, 0.7);
    }

    #swipe-word-display.valid {
      color: #00c87a;
      text-shadow: 0 0 20px rgba(0, 200, 120, 0.7);
    }

    /* Horizontal found-word chips */
    #found-words-row {
      display: flex;
      flex-wrap: nowrap;
      overflow-x: auto;
      gap: 8px;
      padding-bottom: 2px;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }

    #found-words-row::-webkit-scrollbar {
      display: none;
    }

    .found-chip {
      flex-shrink: 0;
      background: rgba(79, 125, 245, 0.18);
      border: 1px solid rgba(79, 125, 245, 0.4);
      border-radius: 20px;
      padding: 5px 8px 5px 12px;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 1px;
      color: #aaccff;
      white-space: nowrap;
      animation: chipIn 0.25s ease;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .chip-del {
      background: rgba(255, 80, 80, 0.2);
      color: #ff8888;
      border-radius: 50%;
      width: 18px;
      height: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      cursor: pointer;
    }

    @keyframes chipIn {
      from {
        opacity: 0;
        transform: scale(0.6) translateY(6px);
      }

      to {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }

    .bar-meta {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      font-weight: 700;
      color: rgba(170, 200, 255, 0.7);
      padding: 0 4px;
    }

    /* Particle canvas overlay */
    #particle-canvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 45;
    }

    /* Word Result Popup */
    #word-result {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0.8);
      padding: 15px 30px;
      border-radius: 50px;
      font-size: 20px;
      font-weight: 800;
      z-index: 55;
      white-space: nowrap;
      pointer-events: none;
      opacity: 0;
      transition: all 0.2s;
    }

    #word-result.show {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
    }

    #word-result.found {
      background: #00c87a;
      color: white;
      box-shadow: 0 10px 40px rgba(0, 200, 120, 0.5);
    }

    #word-result.notfound {
      background: #e84040;
      color: white;
      box-shadow: 0 10px 40px rgba(232, 64, 64, 0.5);
    }

    #word-result.duplicate {
      background: #f5a623;
      color: white;
      box-shadow: 0 10px 40px rgba(245, 166, 35, 0.5);
    }

    /* ── REVIEW MODAL (Spoglio Parole) ────────────── */
    #review-modal {
      position: fixed;
      inset: 0;
      background: rgba(8, 9, 26, 0.95);
      backdrop-filter: blur(20px);
      z-index: 70;
      display: flex;
      flex-direction: column;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s;
    }

    #review-modal.active {
      opacity: 1;
      pointer-events: all;
    }

    .review-header {
      padding: 20px;
      text-align: center;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      padding-top: max(20px, env(safe-area-inset-top));
    }

    .review-header h2 {
      font-size: 24px;
      color: #fff;
      margin-bottom: 5px;
    }

    .review-header p {
      color: #aaccff;
      font-size: 14px;
    }

    .review-list {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .word-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      padding: 14px 20px;
      transition: background 0.2s, opacity 0.2s;
    }

    .word-item.crossed {
      opacity: 0.5;
      background: rgba(255, 80, 80, 0.1);
      border-color: rgba(255, 80, 80, 0.3);
    }

    .word-info {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .word-text {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 1px;
    }

    .word-item.crossed .word-text {
      text-decoration: line-through;
      color: #ff8888;
    }

    .word-pts {
      background: #4f7df5;
      border-radius: 10px;
      padding: 3px 10px;
      font-size: 12px;
      font-weight: 900;
    }

    .word-item.crossed .word-pts {
      background: #888;
    }

    .word-toggle {
      background: rgba(0, 200, 122, 0.15);
      border: 1px solid rgba(0, 200, 122, 0.4);
      color: #00c87a;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      font-size: 18px;
      font-weight: bold;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .word-item.crossed .word-toggle {
      background: rgba(255, 80, 80, 0.15);
      border-color: rgba(255, 80, 80, 0.4);
      color: #ff5050;
    }

    .review-group-header {
      font-size: 13px;
      font-weight: 900;
      color: #aaccff;
      background: rgba(79, 125, 245, 0.15);
      border: 1px solid rgba(79, 125, 245, 0.3);
      padding: 6px 12px;
      border-radius: 10px;
      margin-top: 10px;
      margin-bottom: -2px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .review-footer {
      padding: 20px;
      background: #0b1226;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      padding-bottom: max(20px, env(safe-area-inset-bottom));
    }

    .review-score {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 22px;
      font-weight: 900;
      margin-bottom: 20px;
    }

    .review-score span {
      color: #00c87a;
      font-size: 28px;
    }

    .action-buttons {
      display: flex;
      gap: 10px;
    }

    .btn-outline {
      flex: 1;
      background: transparent;
      border: 2px solid rgba(255, 255, 255, 0.2);
      color: #fff;
      border-radius: 14px;
      padding: 14px;
      font-weight: 600;
      font-size: 15px;
      cursor: pointer;
    }

    .btn-next {
      flex: 2;
      background: linear-gradient(135deg, #00c87a, #009e60);
      border: none;
      color: #fff;
      border-radius: 14px;
      padding: 14px;
      font-weight: 700;
      font-size: 16px;
      cursor: pointer;
    }

    #game-over-modal {
      position: fixed;
      top: 100%;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(11, 18, 38, 0.98);
      backdrop-filter: blur(20px);
      z-index: 105;
      display: flex;
      flex-direction: column;
      transition: top 0.5s cubic-bezier(0.1, 0.9, 0.2, 1);
    }

    #game-over-modal.active {
      top: 0;
    }
  </style>
</head>

<body>
  <div id="bg-gradient"></div>
  <div id="canvas-container"></div>

  <!-- UI Top In-Game -->
  <div id="top-bar">
    <div id="game-stats">
      <div class="stat-badge" id="round-badge">Round 1</div>
    </div>
    <div id="timer-display">03:00</div>
  </div>

  <!-- 3-2-1 countdown -->
  <div id="countdown-overlay">
    <span id="countdown-num"></span>
  </div>

  <!-- Start prompt (Lobby) -->
  <div id="start-prompt">
    <div id="start-prompt-inner">
      <div class="prompt-dice">🎲</div>
      <div class="prompt-title">Cacciaparole</div>
      <div class="prompt-sub" id="lobby-status">Invia il link o inizia da solo</div>

      <button id="btn-start-solo" class="btn-large" style="margin-top: 15px;">
        👤 Gioca da Solo
      </button>
      <button id="btn-challenge" class="btn-large"
        style="margin-top: 10px; background: linear-gradient(135deg, #f5a623, #d35400);">
        🤝 Crea Sfida Multiplayer
      </button>

      <button id="btn-manual-start" class="btn-large"
        style="margin-top: 15px; background: linear-gradient(135deg, #00c87a, #009e60); display: none; font-size:18px; padding:18px; box-shadow: 0 0 30px rgba(0,200,122,0.4);">
        Avvia la Caccia! ⚔️
      </button>
    </div>
  </div>

  <!-- Particle Canvas -->
  <canvas id="particle-canvas"></canvas>

  <!-- Word Swipe Bar -->
  <div id="word-bar">
    <div class="bar-meta">
      <span id="words-found-counter">Parole: 0</span>
      <span id="current-pts-counter">Punti: 0</span>
    </div>
    <div id="swipe-word-display"></div>
    <div id="found-words-row"></div>
  </div>

  <!-- Popup Esito Parola -->
  <div id="word-result"></div>

  <!-- Review Modal (Spoglio) -->
  <div id="review-modal">
    <div class="review-header">
      <h2>Spoglio Parole</h2>
      <p>Confrontati a voce e barra le parole uguali</p>
    </div>

    <div class="review-list" id="review-list">
      <!-- Generato via JS -->
    </div>

    <div class="review-footer">
      <div id="review-confirm-section">
        <button class="btn-large" id="btn-confirm-review"
          style="background: linear-gradient(135deg, #00c87a, #009e60); padding: 16px; font-size: 18px;">
          Conferma la Caccia ✓
        </button>
      </div>

      <div id="review-final-section" style="display:none;">
        <div class="review-score" style="flex-direction: column; align-items: stretch; gap: 5px; margin-bottom: 20px;">
          <div style="display:flex; justify-content:center; align-items:center; flex-direction:column; gap:5px;">
            <span id="review-round-label" style="color:#aaccff; font-size:18px;">Punti Round</span>
            <span style="color:#00c87a; font-size:42px;" id="final-round-score">0</span>
          </div>
        </div>
        <div class="action-buttons">
          <button class="btn-outline" id="btn-reset">Azzera Tutto</button>
          <button class="btn-outline" id="btn-finish-game" style="border-color:#f5a623; color:#f5a623;">Fine
            Partita</button>
          <button class="btn-next" id="btn-next-round">Prossimo ➔</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Game Over Modal -->
  <div id="game-over-modal">
    <div
      style="text-align:center; padding:40px 20px; display:flex; flex-direction:column; height:100%; box-sizing:border-box;">
      <h2 style="color:#fff; font-size:28px; margin:0;">Fine Partita!</h2>
      <p style="color:#aaccff; font-weight:600; margin-top:5px;">Punteggio Totale</p>
      <div id="go-total-score"
        style="font-size: 80px; color: #00c87a; font-weight: 900; margin: 30px 0; text-shadow: 0 0 30px rgba(0,200,122,0.6);">
        0</div>

      <button id="btn-show-go-words" class="btn-outline"
        style="width:100%; margin-bottom: 20px; margin-top:auto; font-size:17px; border-color:#4f7df5; color:#aaccff; font-weight:bold;">🔍
        Mostra Tutte le Parole</button>

      <div class="action-buttons">
        <button class="btn-next" id="btn-restart-game" style="font-size:18px; padding:18px; width:100%;">Nuova
          Partita</button>
      </div>
    </div>
  </div>

  <div id="master-review-modal"
    style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:200; backdrop-filter:blur(10px);">
    <div
      style="position:absolute; top:20px; bottom:20px; left:20px; right:20px; background:#0b1226; border-radius:15px; border:1px solid rgba(79,125,245,0.4); display:flex; flex-direction:column; overflow:hidden;">
      <div
        style="padding:15px; display:flex; justify-content:space-between; align-items:center; background:rgba(79,125,245,0.15); border-bottom:1px solid rgba(79,125,245,0.3);">
        <h3 style="margin:0; color:#fff;">Tutte le Parole</h3>
        <button id="btn-close-master-review"
          style="background:transparent; border:none; color:#ff5050; font-size:24px; font-weight:bold; cursor:pointer;">✕</button>
      </div>
      <div class="review-list" id="master-review-list"
        style="flex:1; overflow-y:auto; padding:15px; margin:0; border:none;">
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script>
    /* ═══════════════════════════════════════════════════════
       Cacciaparole — Mobile Premium Edition
       ═══════════════════════════════════════════════════════ */

    // ── GAME STATE & SESSION ────────────────────────────────────────────────
    let currentRound = parseInt(sessionStorage.getItem('cp_round')) || 1;
    let totalGameScore = parseInt(sessionStorage.getItem('cp_total_score')) || 0;
    let foundWords = []; // Array: { text: "CIAO", pts: 2, crossed: false }

    document.getElementById('round-badge').innerText = `Round ${currentRound}`;

    // ── 50 DICE (Ottimizzati Italiano) ──────────────────────────────────────
    const DADI = [
      ["A", "E", "H", "I", "N", "S"], ["A", "H", "I", "L", "O", "R"], ["E", "H", "O", "P", "T", "U"],
      ["A", "E", "I", "QU", "R", "T"], ["A", "I", "O", "QU", "L", "N"],
      ["A", "E", "O", "Z", "C", "M"], ["E", "I", "U", "Z", "D", "R"], ["A", "I", "O", "Z", "S", "T"],
      ["A", "E", "I", "B", "L", "S"], ["A", "O", "U", "B", "N", "T"], ["E", "I", "O", "B", "C", "R"],
      ["A", "A", "E", "F", "M", "T"], ["E", "I", "U", "F", "N", "P"], ["A", "I", "O", "F", "R", "S"],
      ["A", "E", "I", "V", "D", "N"], ["E", "O", "U", "V", "L", "C"], ["A", "I", "O", "V", "R", "T"],
      ["A", "E", "I", "C", "R", "S"], ["A", "E", "O", "C", "L", "T"], ["E", "I", "O", "C", "N", "P"],
      ["A", "I", "U", "C", "M", "S"], ["A", "E", "I", "D", "R", "T"], ["A", "E", "O", "D", "L", "N"],
      ["E", "I", "O", "D", "S", "P"], ["A", "I", "U", "G", "R", "L"], ["A", "E", "O", "G", "N", "T"],
      ["E", "I", "O", "G", "S", "M"], ["A", "A", "E", "L", "N", "R"], ["E", "E", "I", "L", "S", "T"],
      ["I", "I", "O", "M", "R", "C"], ["O", "O", "U", "M", "S", "T"], ["A", "E", "I", "N", "P", "R"],
      ["A", "E", "O", "N", "S", "T"], ["E", "I", "O", "P", "L", "C"], ["A", "I", "U", "P", "R", "N"],
      ["A", "A", "E", "R", "S", "T"], ["E", "E", "I", "R", "L", "N"], ["I", "I", "O", "S", "T", "C"],
      ["O", "O", "A", "S", "L", "P"], ["U", "A", "E", "T", "N", "R"], ["A", "E", "I", "T", "S", "D"],
      ["A", "I", "O", "L", "R", "M"], ["E", "O", "U", "N", "S", "C"], ["A", "E", "E", "R", "T", "N"],
      ["E", "I", "I", "S", "L", "R"], ["I", "O", "O", "T", "N", "S"], ["A", "O", "U", "C", "R", "T"],
      ["A", "A", "I", "D", "L", "S"], ["E", "E", "O", "M", "N", "T"], ["A", "E", "I", "P", "S", "R"],
      ["E", "I", "O", "L", "T", "N"], ["A", "I", "U", "R", "S", "C"]
    ];

    // ── PRNG MULTIPLAYER & SHUFFLE ──────────────────────────────────────────
    function generateMatchID() { return Math.random().toString(36).substring(2, 10); }

    function cyrb128(str) {
      let h1 = 1779033703, h2 = 3144134277, h3 = 1013904242, h4 = 2773480762;
      for (let i = 0, k; i < str.length; i++) {
        k = str.charCodeAt(i);
        h1 = h2 ^ Math.imul(h1 ^ k, 597399067); h2 = h3 ^ Math.imul(h2 ^ k, 2869860233);
        h3 = h4 ^ Math.imul(h3 ^ k, 951274213); h4 = h1 ^ Math.imul(h4 ^ k, 2716044179);
      }
      h1 = Math.imul(h3 ^ (h1 >>> 18), 597399067); h2 = Math.imul(h4 ^ (h2 >>> 22), 2869860233);
      h3 = Math.imul(h1 ^ (h3 >>> 17), 951274213); h4 = Math.imul(h2 ^ (h4 >>> 19), 2716044179);
      return [(h1 ^ h2 ^ h3 ^ h4) >>> 0, (h2 ^ h1) >>> 0, (h3 ^ h1) >>> 0, (h4 ^ h1) >>> 0];
    }

    function sfc32(a, b, c, d) {
      return function () {
        a >>>= 0; b >>>= 0; c >>>= 0; d >>>= 0;
        var t = (a + b | 0) + d | 0;
        d = d + 1 | 0; a = b ^ b >>> 9; b = c + (c << 3) | 0;
        c = c << 21 | c >>> 11; c = c + t | 0;
        return (t >>> 0) / 4294967296;
      }
    }

    let currentMatchID = generateMatchID();
    let shouldStartLobbyOnLoad = false;

    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.has('match')) {
      currentMatchID = urlParams.get('match');
      shouldStartLobbyOnLoad = true;
    }

    let seedPart = cyrb128(currentMatchID);
    let seededRandom = sfc32(seedPart[0], seedPart[1], seedPart[2], seedPart[3]);

    function shuffleArray(array) {
      const arr = [...array];
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(seededRandom() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    // ── THREE.JS SETUP ────────────────────────────────────────────────────────
    const GRID = 5;
    const DSIZ = 1.05;
    const GAP = 1.38;
    const OX = -((GRID - 1) * GAP) / 2;
    const OZ = -((GRID - 1) * GAP) / 2;

    let gridLetters = [];
    let diceMeshes = [];
    let shakePositions = [];
    let shakeVelocities = [];
    let settledPositions = [];
    let timerInterval = null;
    let gamePhase = 'idle';
    let audioCtx = null;

    const scene = new THREE.Scene();
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);

    document.getElementById('canvas-container').appendChild(renderer.domElement);

    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 200);
    camera.position.set(0, 18, 16);
    camera.lookAt(0, 0, 0);

    function calcCameraY() {
      // Modificato per lasciare spazio alla UI in basso
      const fovRad = camera.fov * Math.PI / 180;
      const gridExtent = (GRID - 1) * GAP / 2 + DSIZ;
      const aspect = window.innerWidth / window.innerHeight;
      return Math.max(gridExtent / Math.tan(fovRad / 2) * 1.25, (gridExtent / aspect) / Math.tan(fovRad / 2) * 1.1);
    }

    scene.add(new THREE.AmbientLight(0xaac0ff, 0.65));
    const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
    dirLight.position.set(6, 18, 10);
    dirLight.castShadow = true;
    scene.add(dirLight);

    const ground = new THREE.Mesh(
      new THREE.PlaneGeometry(60, 60),
      new THREE.MeshStandardMaterial({ color: 0x08091a, roughness: 1 })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = -DSIZ / 2 - 0.02;
    scene.add(ground);

    const BOX_W = GRID * GAP + 1.2, BOX_H = 4.8, GLASS_OPACITY = 0.22;
    const glassMat = new THREE.MeshPhysicalMaterial({ color: 0xaaccff, transparent: true, opacity: GLASS_OPACITY, roughness: 0.04, side: THREE.DoubleSide, depthWrite: false });
    const glassGroup = new THREE.Group();
    scene.add(glassGroup);

    // Semplificato per performance
    function addPanel(w, h, d, px, py, pz) {
      const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), glassMat);
      m.position.set(px, py, pz); glassGroup.add(m);
    }
    const hw = BOX_W / 2 + 0.08, hy = BOX_H / 2 - 0.4;
    addPanel(BOX_W, BOX_H, 0.12, 0, hy, hw); addPanel(BOX_W, BOX_H, 0.12, 0, hy, -hw);
    addPanel(0.12, BOX_H, BOX_W, -hw, hy, 0); addPanel(0.12, BOX_H, BOX_W, hw, hy, 0);

    function makeLetterTex(letter) {
      const sz = 256, cv = document.createElement('canvas'), ctx = cv.getContext('2d');
      cv.width = cv.height = sz;
      ctx.fillStyle = '#f4efe4'; ctx.fillRect(0, 0, sz, sz);
      ctx.fillStyle = '#1a1b2e'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.font = `bold ${letter === 'QU' ? 74 : 106}px Inter`;
      ctx.fillText(letter, sz / 2, sz / 2);
      return new THREE.CanvasTexture(cv);
    }

    const blankTex = (() => {
      const cv = document.createElement('canvas'); cv.width = cv.height = 16;
      const ctx = cv.getContext('2d'); ctx.fillStyle = '#ede8da'; ctx.fillRect(0, 0, 16, 16);
      return new THREE.CanvasTexture(cv);
    })();

    function makeDiceMats(letter) {
      const mk = tex => new THREE.MeshStandardMaterial({ map: tex, roughness: 0.5 });
      return [mk(blankTex), mk(blankTex), mk(makeLetterTex(letter)), mk(blankTex), mk(blankTex), mk(blankTex)];
    }

    function initGrid() {
      const shuffled = shuffleArray(DADI);
      for (let i = 0; i < 25; i++) {
        const letter = shuffled[i][Math.floor(seededRandom() * shuffled[i].length)];
        gridLetters.push(letter);
        const mesh = new THREE.Mesh(new THREE.BoxGeometry(DSIZ, DSIZ, DSIZ), makeDiceMats(letter));
        mesh.castShadow = mesh.receiveShadow = true;
        const col = i % GRID, row = Math.floor(i / GRID);
        const settledPos = new THREE.Vector3(OX + col * GAP, 0, OZ + row * GAP);
        settledPositions.push(settledPos);
        mesh.position.copy(settledPos);
        shakePositions.push(new THREE.Vector3()); shakeVelocities.push(new THREE.Vector3());
        scene.add(mesh); diceMeshes.push(mesh);
      }
    }

    function rollNewLetters() {
      const shuffled = shuffleArray(DADI);
      for (let i = 0; i < 25; i++) {
        const letter = shuffled[i][Math.floor(seededRandom() * shuffled[i].length)];
        gridLetters[i] = letter;
        diceMeshes[i].material = makeDiceMats(letter);
      }
    }

    const BXYZ = (BOX_W - DSIZ * 1.6) / 2, BY_HI = BOX_H - DSIZ * 0.866 - 0.1, BY_LO = DSIZ * 0.866;
    function tickShaking(ts) {
      diceMeshes.forEach((mesh, i) => {
        const vel = shakeVelocities[i], pos = shakePositions[i];
        vel.y -= 0.01; // gravità
        pos.add(vel);
        if (pos.x > BXYZ || pos.x < -BXYZ) { vel.x *= -0.8; pos.x = pos.x > 0 ? BXYZ : -BXYZ; }
        if (pos.z > BXYZ || pos.z < -BXYZ) { vel.z *= -0.8; pos.z = pos.z > 0 ? BXYZ : -BXYZ; }
        if (pos.y > BY_HI || pos.y < BY_LO) { vel.y *= -0.8; pos.y = pos.y > 0 ? BY_HI : BY_LO; }
        mesh.position.copy(pos);
        mesh.rotation.x += vel.x; mesh.rotation.y += vel.y; mesh.rotation.z += vel.z;
      });
    }

    function settleAndZoom(onDone) {
      gamePhase = 'settling';
      diceMeshes.forEach((mesh, i) => {
        const t = settledPositions[i];
        const delay = 0.1 + Math.random() * 0.3;
        gsap.to(mesh.position, { x: t.x, z: t.z, duration: 0.8, ease: 'power2.inOut', delay: delay * 0.3 });
        gsap.to(mesh.position, { y: t.y, duration: 1.0, ease: 'bounce.out', delay: delay });
        gsap.to(mesh.rotation, { x: 0, y: 0, z: 0, duration: 0.9, ease: 'power2.out', delay: delay * 0.2 });
      });
      gsap.to(glassMat, { opacity: 0, duration: 0.9, delay: 0.3 });

      const topY = calcCameraY();
      gsap.to(camera.position, {
        x: 0, y: topY, z: 2, // Z leggermente spostato per visuale migliore
        duration: 1.8, ease: 'power3.inOut', delay: 0.7,
        onUpdate: () => camera.lookAt(0, 0, 1),
        onComplete: () => { gamePhase = 'playing'; if (onDone) onDone(); }
      });
    }

    // ── GAME LOGIC ────────────────────────────────────────────────────────────
    function triggerStart() {
      if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();

      document.getElementById('timer-display').style.display = 'none';
      document.getElementById('game-stats').classList.remove('visible');

      if (gamePhase === 'idle') {
        if (diceMeshes.length === 0) initGrid();
        rollNewLetters();
        for (let i = 0; i < 25; i++) {
          shakePositions[i].copy(settledPositions[i]);
          shakePositions[i].y = BY_LO + Math.random() * (BY_HI - BY_LO);
          shakeVelocities[i].set((Math.random() - 0.5) * 0.8, Math.random() * 0.8 + 0.5, (Math.random() - 0.5) * 0.8);
        }
        gamePhase = 'shaking';
      }

      document.getElementById('start-prompt').style.display = 'none';

      let btnManual = document.getElementById('btn-manual-start');
      if (btnManual) btnManual.style.display = 'none';

      const countOverlay = document.getElementById('countdown-overlay');
      const countNum = document.getElementById('countdown-num');
      countOverlay.classList.add('active');

      let idx = 3;
      function step() {
        if (idx === 0) {
          countOverlay.classList.remove('active');
          playBeep(1046, 0.1, 0.5); setTimeout(() => playBeep(1318, 0.2, 0.6), 100);
          settleAndZoom(startGameTimer);
          return;
        }
        playBeep(500 + idx * 100, 0.1, 0.5);
        countNum.textContent = idx;
        gsap.fromTo(countNum, { opacity: 0, scale: 1.5 }, { opacity: 1, scale: 1, duration: 0.3, ease: 'back.out' });
        setTimeout(() => gsap.to(countNum, { opacity: 0, scale: 0.5, duration: 0.3 }), 600);
        idx--;
        setTimeout(step, 1000);
      }
      step();
    }

    function startGameTimer() {
      document.getElementById('game-stats').classList.add('visible');
      const timerEl = document.getElementById('timer-display');
      timerEl.style.display = 'block';
      document.getElementById('word-bar').classList.add('visible');
      document.getElementById('found-words-row').innerHTML = ''; // clear chips
      requestWakeLock();

      foundWords = [];
      updateScoreUI();

      const durata = 180;
      timerEl.textContent = String(Math.floor(durata / 60)).padStart(2, '0') + ':' + String(durata % 60).padStart(2, '0');
      const endT = Date.now() + (durata * 1000);

      timerInterval = setInterval(() => {
        const left = Math.max(0, Math.ceil((endT - Date.now()) / 1000));
        timerEl.textContent = String(Math.floor(left / 60)).padStart(2, '0') + ':' + String(left % 60).padStart(2, '0');

        if (left <= 3 && left > 0 && timerEl.dataset.sec !== String(left)) {
          timerEl.classList.add('warning');
          playBeep(1050, 0.1, 0.5);
          timerEl.dataset.sec = String(left);
        }

        if (left <= 0) {
          clearInterval(timerInterval);
          timerEl.textContent = 'STOP!';
          gamePhase = 'over';
          releaseWakeLock();
          playBeep(880, 0.2); setTimeout(() => playBeep(660, 0.2), 200); setTimeout(() => playBeep(440, 1), 400);
          document.getElementById('word-bar').classList.remove('visible');
          setTimeout(showReviewModal, 1500);
        }
      }, 200);
    }

    // ── AUDIO & HAPTICS ───────────────────────────────────────────────────────
    function getACtx() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); return audioCtx; }
    function playBeep(f = 880, d = 0.1, g = 0.4) {
      try {
        const c = getACtx(), o = c.createOscillator(), gn = c.createGain();
        o.connect(gn); gn.connect(c.destination);
        o.type = 'sine'; o.frequency.value = f;
        gn.gain.setValueAtTime(g, c.currentTime);
        gn.gain.exponentialRampToValueAtTime(0.001, c.currentTime + d);
        o.start(); o.stop(c.currentTime + d);
      } catch (e) { }
    }
    function playPop() {
      try {
        const c = getACtx();
        [0, 60, 120].forEach(delay => {
          const o = c.createOscillator(), gn = c.createGain();
          o.connect(gn); gn.connect(c.destination);
          o.type = 'triangle';
          o.frequency.setValueAtTime(900 + delay * 4, c.currentTime + delay / 1000);
          o.frequency.exponentialRampToValueAtTime(400, c.currentTime + delay / 1000 + 0.18);
          gn.gain.setValueAtTime(0.35, c.currentTime + delay / 1000);
          gn.gain.exponentialRampToValueAtTime(0.001, c.currentTime + delay / 1000 + 0.2);
          o.start(c.currentTime + delay / 1000);
          o.stop(c.currentTime + delay / 1000 + 0.22);
        });
      } catch (e) { }
    }
    function vibrate(ms) { if (navigator.vibrate) navigator.vibrate(ms); }

    // ── WORD VALIDATION ───────────────────────────────────────────────────────
    function tokenize(word) {
      const up = word.toUpperCase().replace(/\s/g, '');
      const tk = []; let i = 0;
      while (i < up.length) {
        if (up.substr(i, 2) === 'QU') { tk.push('QU'); i += 2; }
        else { tk.push(up[i]); i++; }
      }
      return tk;
    }

    function findWord(word) {
      const tk = tokenize(word);
      if (tk.length < 2) return null;
      const gl = gridLetters.map(l => l.toUpperCase());
      function dfs(ti, ci, vis) {
        if (ti === tk.length) return vis.slice();
        const r = Math.floor(ci / GRID), c = ci % GRID;
        for (let dr = -1; dr <= 1; dr++) for (let dc = -1; dc <= 1; dc++) {
          if (!dr && !dc) continue;
          const nr = r + dr, nc = c + dc;
          if (nr < 0 || nr >= GRID || nc < 0 || nc >= GRID) continue;
          const ni = nr * GRID + nc;
          if (vis.includes(ni)) continue;
          if (gl[ni] === tk[ti]) { vis.push(ni); const res = dfs(ti + 1, ni, vis); if (res) return res; vis.pop(); }
        }
        return null;
      }
      for (let s = 0; s < 25; s++) if (gl[s] === tk[0]) { const p = dfs(1, s, [s]); if (p) return p; }
      return null;
    }

    function wordPoints(tkLen) {
      if (tkLen < 4) return 0;
      if (tkLen === 4) return 1;
      if (tkLen === 5) return 2;
      if (tkLen === 6) return 3;
      if (tkLen === 7) return 5;
      return 11;
    }

    // ── SCREEN WAKE LOCK ──────────────────────────────────────────────────────
    let wakeLock = null;
    async function requestWakeLock() {
      if (!('wakeLock' in navigator)) return;
      try { wakeLock = await navigator.wakeLock.request('screen'); } catch (e) { }
    }
    async function releaseWakeLock() {
      if (wakeLock) { try { await wakeLock.release(); } catch (e) { } wakeLock = null; }
    }

    // ── 2D PARTICLE SYSTEM ───────────────────────────────────────────────────
    const pCanvas = document.getElementById('particle-canvas');
    const pCtx = pCanvas.getContext('2d');
    let particles = [];
    function resizeParticleCanvas() {
      pCanvas.width = window.innerWidth;
      pCanvas.height = window.innerHeight;
    }
    resizeParticleCanvas();
    window.addEventListener('resize', resizeParticleCanvas);

    function spawnParticles(screenX, screenY) {
      const colors = ['#00c87a', '#4f7df5', '#f5a623', '#ff5050', '#fff', '#a78bfa'];
      for (let i = 0; i < 28; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = 3 + Math.random() * 7;
        particles.push({
          x: screenX, y: screenY,
          vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed - 3,
          r: 3 + Math.random() * 5,
          color: colors[Math.floor(Math.random() * colors.length)],
          life: 1, decay: 0.025 + Math.random() * 0.03
        });
      }
    }

    function tickParticles() {
      pCtx.clearRect(0, 0, pCanvas.width, pCanvas.height);
      particles = particles.filter(p => p.life > 0);
      particles.forEach(p => {
        p.x += p.vx; p.y += p.vy; p.vy += 0.25;
        p.vx *= 0.97; p.life -= p.decay;
        pCtx.globalAlpha = Math.max(0, p.life);
        pCtx.fillStyle = p.color;
        pCtx.beginPath();
        pCtx.arc(p.x, p.y, p.r * p.life, 0, Math.PI * 2);
        pCtx.fill();
      });
      pCtx.globalAlpha = 1;
    }

    // Convert a 3D world position to 2D canvas screen coordinates
    function worldToScreen(pos3d) {
      const v = pos3d.clone().project(camera);
      return {
        x: (v.x * 0.5 + 0.5) * window.innerWidth,
        y: (-v.y * 0.5 + 0.5) * window.innerHeight
      };
    }

    // ── RAYCASTER & SWIPE INTERACTION ────────────────────────────────────────
    const raycaster = new THREE.Raycaster();
    const pointerNDC = new THREE.Vector2();

    let isDragging = false;
    let swipePath = []; // array of mesh indices
    const swipeDisplayEl = document.getElementById('swipe-word-display');
    const resPopup = document.getElementById('word-result');
    let resTimer = null;

    // Die material colors
    const COLOR_DEFAULT = 0xf4efe4;
    const COLOR_SELECTED = 0x64b8ff;
    const COLOR_VALID = 0x00c87a;
    const COLOR_INVALID = 0xff5050;
    const COLOR_SUCCESS = 0xffd700;

    function getDiceIndexAtPointer(clientX, clientY) {
      pointerNDC.x = (clientX / window.innerWidth) * 2 - 1;
      pointerNDC.y = -(clientY / window.innerHeight) * 2 + 1;
      raycaster.setFromCamera(pointerNDC, camera);
      const hits = raycaster.intersectObjects(diceMeshes);
      if (!hits.length) return -1;

      const hit = hits[0];
      const dx = hit.point.x - hit.object.position.x;
      const dz = hit.point.z - hit.object.position.z;
      const dist2D = Math.sqrt(dx * dx + dz * dz);

      // La hitbox logica diventa un cerchio di raggio 0.42 (rispetto a mezza grandezza del dado 0.525).
      // Questo "taglia" gli angoli e i bordi, ignorando i tocchi accidentali!
      if (dist2D > 0.42) return -1;

      return diceMeshes.indexOf(hit.object);
    }

    function areDiceAdjacent(idxA, idxB) {
      const rA = Math.floor(idxA / GRID), cA = idxA % GRID;
      const rB = Math.floor(idxB / GRID), cB = idxB % GRID;
      return Math.abs(rA - rB) <= 1 && Math.abs(cA - cB) <= 1;
    }

    function setDiceColor(meshIdx, hex) {
      diceMeshes[meshIdx].material.forEach(m => m.color.setHex(hex));
    }

    function resetAllDiceColors() {
      diceMeshes.forEach((_, i) => setDiceColor(i, COLOR_DEFAULT));
    }

    function currentSwipeWord() {
      return swipePath.map(i => gridLetters[i]).join('');
    }

    function updateSwipeDisplay() {
      const word = currentSwipeWord();
      swipeDisplayEl.textContent = word;
      const pts = wordPoints(word.length);
      if (word.length === 0) {
        swipeDisplayEl.className = '';
      } else if (pts > 0 || word.length >= 4) {
        swipeDisplayEl.className = 'valid';
      } else {
        swipeDisplayEl.className = '';
      }
    }

    function onPointerDown(e) {
      if (gamePhase !== 'playing') return;
      e.preventDefault();
      isDragging = true;
      swipePath = [];
      resetAllDiceColors();
      const cx = e.touches ? e.touches[0].clientX : e.clientX;
      const cy = e.touches ? e.touches[0].clientY : e.clientY;
      const idx = getDiceIndexAtPointer(cx, cy);
      if (idx >= 0) {
        swipePath.push(idx);
        setDiceColor(idx, COLOR_SELECTED);
        gsap.to(diceMeshes[idx].position, { y: 0.3, duration: 0.1, yoyo: true, repeat: 1 });
        vibrate(30);
        updateSwipeDisplay();
      }
    }

    function onPointerMove(e) {
      if (!isDragging || gamePhase !== 'playing') return;
      e.preventDefault();
      const cx = e.touches ? e.touches[0].clientX : e.clientX;
      const cy = e.touches ? e.touches[0].clientY : e.clientY;
      const idx = getDiceIndexAtPointer(cx, cy);
      if (idx < 0) return;

      if (swipePath.includes(idx)) {
        if (swipePath.length >= 2 && idx === swipePath[swipePath.length - 2]) {
          const removedIdx = swipePath.pop();
          setDiceColor(removedIdx, COLOR_DEFAULT);
          vibrate(20);
          updateSwipeDisplay();
        }
        return;
      }

      if (swipePath.length > 0 && !areDiceAdjacent(swipePath[swipePath.length - 1], idx)) return;
      swipePath.push(idx);
      setDiceColor(idx, COLOR_SELECTED);
      gsap.to(diceMeshes[idx].position, { y: 0.25, duration: 0.08, yoyo: true, repeat: 1 });
      vibrate(30);
      updateSwipeDisplay();
    }

    function onPointerUp(e) {
      if (!isDragging) return;
      isDragging = false;
      if (gamePhase !== 'playing' || swipePath.length === 0) {
        resetAllDiceColors();
        swipeDisplayEl.textContent = '';
        swipeDisplayEl.className = '';
        return;
      }
      const rawWord = currentSwipeWord();
      const tk = tokenize(rawWord);

      const finalize = (success) => {
        setTimeout(() => {
          resetAllDiceColors();
          swipeDisplayEl.textContent = '';
          swipeDisplayEl.className = '';
          swipePath = [];
        }, success ? 700 : 400);
      };

      if (rawWord.length < 4) {
        swipePath.forEach(i => setDiceColor(i, COLOR_INVALID));
        showPopup('notfound', 'Min. 4 lettere!');
        vibrate([80, 40, 80]);
        finalize(false);
        return;
      }
      if (foundWords.some(w => w.text === rawWord)) {
        swipePath.forEach(i => setDiceColor(i, COLOR_INVALID));
        showPopup('duplicate', 'GIÀ TROVATA!');
        vibrate([50, 50, 50]);
        finalize(false);
        return;
      }

      // Validate using DFS path matcher
      const validPath = findWord(rawWord);
      if (validPath) {
        const pts = wordPoints(rawWord.length);
        foundWords.push({ text: rawWord, pts, crossed: false });
        updateScoreUI();
        showPopup('found', `✓ +${pts} PT`);
        playPop();
        vibrate([50, 50, 100]);
        // Flash gold then animate
        swipePath.forEach((mi, i) => {
          setDiceColor(mi, COLOR_SUCCESS);
          gsap.to(diceMeshes[mi].position, { y: 0.6, duration: 0.12, yoyo: true, repeat: 1, delay: i * 0.05 });
        });
        // Particles at the last die's screen position
        const lastPos = diceMeshes[swipePath[swipePath.length - 1]].position;
        const sc = worldToScreen(lastPos);
        spawnParticles(sc.x, sc.y);
        finalize(true);
      } else {
        swipePath.forEach(i => setDiceColor(i, COLOR_INVALID));
        showPopup('notfound', 'NON TROVATA!');
        vibrate([100]);
        finalize(false);
      }
    }

    // Bind events onto the renderer canvas (captures both mouse and touch)
    const cvs = renderer.domElement;
    cvs.addEventListener('pointerdown', onPointerDown, { passive: false });
    cvs.addEventListener('pointermove', onPointerMove, { passive: false });
    cvs.addEventListener('pointerup', onPointerUp, { passive: false });
    cvs.addEventListener('pointercancel', onPointerUp, { passive: false });
    // Also handle native touch events to block browser rubber-band/pull-to-refresh
    cvs.addEventListener('touchstart', e => e.preventDefault(), { passive: false });
    cvs.addEventListener('touchmove', e => e.preventDefault(), { passive: false });

    function showPopup(type, text) {
      clearTimeout(resTimer);
      resPopup.textContent = text;
      resPopup.className = `show ${type}`;
      resTimer = setTimeout(() => resPopup.className = '', 1600);
    }

    document.getElementById('found-words-row').addEventListener('click', (e) => {
      const trg = e.target.closest('.chip-del');
      if (trg) {
        e.stopPropagation();
        const idx = parseInt(trg.dataset.idx, 10);
        foundWords.splice(idx, 1);
        updateScoreUI();
        vibrate(30);
      }
    });

    function updateScoreUI() {
      const pts = foundWords.filter(w => !w.crossed).reduce((sum, w) => sum + w.pts, 0);
      document.getElementById('words-found-counter').textContent = `Parole: ${foundWords.length}`;
      document.getElementById('current-pts-counter').textContent = `Punti: ${pts}`;
      // Rebuild the chip list
      const row = document.getElementById('found-words-row');
      row.innerHTML = '';
      foundWords.forEach((w, index) => {
        const chip = document.createElement('div');
        chip.className = 'found-chip';
        chip.innerHTML = `<span>${w.text} <small style="opacity:0.75">+${w.pts}</small></span> <div class="chip-del" data-idx="${index}">✖</div>`;
        row.appendChild(chip);
      });
      row.scrollLeft = row.scrollWidth;
    }

    // ── REVIEW MODAL LOGIC ────────────────────────────────────────────────────
    document.getElementById('btn-confirm-review').addEventListener('click', () => {
      document.getElementById('review-confirm-section').style.display = 'none';
      document.getElementById('review-final-section').style.display = 'block';
      calcFinalRoundScore();
      vibrate([50, 50, 100]);
    });

    function showReviewModal() {
      const modal = document.getElementById('review-modal');
      const list = document.getElementById('review-list');
      list.innerHTML = '';

      document.getElementById('review-confirm-section').style.display = 'block';
      document.getElementById('review-final-section').style.display = 'none';

      const roundLabelEl = document.getElementById('review-round-label');
      if (roundLabelEl) roundLabelEl.textContent = `Round ${currentRound}:`;

      // Raggruppa per punti
      const groups = { 11: [], 5: [], 3: [], 2: [], 1: [] };
      foundWords.sort((a, b) => a.text.localeCompare(b.text)); // Ordina alfabeticamente
      foundWords.forEach(w => {
        if (groups[w.pts]) groups[w.pts].push(w);
      });

      const ptsLabels = {
        11: '11 Punti (8+ lettere)',
        5: '5 Punti (7 lettere)',
        3: '3 Punti (6 lettere)',
        2: '2 Punti (5 lettere)',
        1: '1 Punto (4 lettere)'
      };

      [11, 5, 3, 2, 1].forEach(ptsVal => {
        if (groups[ptsVal] && groups[ptsVal].length > 0) {
          const header = document.createElement('div');
          header.className = 'review-group-header';
          header.textContent = ptsLabels[ptsVal];
          list.appendChild(header);

          groups[ptsVal].sort((a, b) => a.text.localeCompare(b.text)).forEach((w, index) => {
            const div = document.createElement('div');
            div.className = w.crossed ? 'word-item crossed' : 'word-item';
            div.innerHTML = `
              <div class="word-info">
                <span class="word-pts">${w.pts}</span>
                <span class="word-text">${w.text}</span>
              </div>
              <button class="word-toggle">${w.crossed ? '✕' : '✓'}</button>
            `;

            div.querySelector('.word-toggle').addEventListener('click', () => {
              w.crossed = !w.crossed;
              div.className = w.crossed ? 'word-item crossed' : 'word-item';
              div.querySelector('.word-toggle').textContent = w.crossed ? '✕' : '✓';
              vibrate(50);
              calcFinalRoundScore();
            });

            list.appendChild(div);
          });
        }
      });

      modal.classList.add('active');
    }

    function calcFinalRoundScore() {
      const score = foundWords.filter(w => !w.crossed).reduce((s, w) => s + w.pts, 0);
      document.getElementById('final-round-score').textContent = score;
      return score;
    }

    function saveRoundData() {
      const validThisRound = foundWords.filter(w => !w.crossed).map(w => ({ ...w, round: currentRound }));
      let masterLog = JSON.parse(sessionStorage.getItem('cp_master_words') || '[]');
      masterLog = masterLog.concat(validThisRound);
      sessionStorage.setItem('cp_master_words', JSON.stringify(masterLog));
      return masterLog;
    }

    // EVENTI FINE GIOCO
    document.getElementById('btn-finish-game').addEventListener('click', () => {
      document.getElementById('review-modal').classList.remove('active');
      const masterLog = saveRoundData();

      const goModal = document.getElementById('game-over-modal');
      const scoreEl = document.getElementById('go-total-score');

      let grandTotal = masterLog.reduce((s, w) => s + w.pts, 0);
      scoreEl.textContent = grandTotal;
      goModal.classList.add('active');

      // Esplosione Particelle Massiccia
      for (let i = 0; i < 40; i++) setTimeout(() => spawnParticles(window.innerWidth / 2, window.innerHeight / 2), i * 30);

      const list = document.getElementById('master-review-list');
      list.innerHTML = '';

      const ptsLabels = { 11: '11 Punti', 5: '5 Punti', 3: '3 Punti', 2: '2 Punti', 1: '1 Punto' };
      const maxRound = Math.max(...masterLog.map(w => w.round || 1));

      for (let r = 1; r <= maxRound; r++) {
        const wordsInRound = masterLog.filter(w => (w.round || 1) === r);
        if (wordsInRound.length === 0) continue;

        const rHeader = document.createElement('div');
        rHeader.style.cssText = "font-size:16px; font-weight:900; color:#fff; text-align:center; padding:10px; margin-top:20px; border-bottom:1px solid rgba(255,255,255,0.1);";
        rHeader.textContent = `ROUND ${r}`;
        list.appendChild(rHeader);

        const groups = {};
        wordsInRound.forEach(w => {
          if (!groups[w.pts]) groups[w.pts] = [];
          groups[w.pts].push(w);
        });

        [11, 5, 3, 2, 1].forEach(ptsVal => {
          if (groups[ptsVal] && groups[ptsVal].length > 0) {
            const pHeader = document.createElement('div');
            pHeader.className = 'review-group-header';
            pHeader.textContent = ptsLabels[ptsVal];
            list.appendChild(pHeader);

            groups[ptsVal].sort((a, b) => a.text.localeCompare(b.text)).forEach(w => {
              const div = document.createElement('div');
              div.className = w.crossed ? 'word-item crossed' : 'word-item';
              div.innerHTML = `
                  <div class="word-info">
                    <span class="word-pts">${w.pts}</span>
                    <span class="word-text">${w.text}</span>
                  </div>
                  <button class="word-toggle">${w.crossed ? '✕' : '✓'}</button>
                 `;

              div.querySelector('.word-toggle').addEventListener('click', () => {
                w.crossed = !w.crossed;
                div.className = w.crossed ? 'word-item crossed' : 'word-item';
                div.querySelector('.word-toggle').textContent = w.crossed ? '✕' : '✓';
                sessionStorage.setItem('cp_master_words', JSON.stringify(masterLog));
                vibrate(50);
                scoreEl.textContent = masterLog.filter(mw => !mw.crossed).reduce((s, mw) => s + mw.pts, 0);
              });
              list.appendChild(div);
            });
          }
        });
      }
    });

    document.getElementById('btn-show-go-words').addEventListener('click', () => {
      document.getElementById('master-review-modal').style.display = 'block';
    });

    document.getElementById('btn-close-master-review').addEventListener('click', () => {
      document.getElementById('master-review-modal').style.display = 'none';
    });

    document.getElementById('btn-restart-game').addEventListener('click', () => {
      sessionStorage.clear();
      window.location.href = window.location.pathname;
    });

    // ── NEXT ROUND NATIVO SENZA RELOAD ─────────────────────────────────────
    let isNavigating = false;
    document.getElementById('btn-next-round').addEventListener('click', (e) => {
      if (isNavigating) return;
      isNavigating = true;
      e.target.textContent = "Attendere...";
      e.target.style.opacity = "0.7";

      saveRoundData();

      const roundScore = calcFinalRoundScore();
      totalGameScore += roundScore;
      currentRound++;

      sessionStorage.setItem('cp_total_score', totalGameScore);
      sessionStorage.setItem('cp_round', currentRound);

      const nextSeedStr = currentMatchID + "_round_" + currentRound;
      const nextMatchID = Math.abs(cyrb128(nextSeedStr)[0]).toString(36);

      const urlBase = window.location.protocol + "//" + window.location.host + window.location.pathname;
      window.history.pushState({}, '', `${urlBase}?match=${nextMatchID}`);

      document.getElementById('review-modal').classList.remove('active');
      document.getElementById('game-over-modal').classList.remove('active');

      foundWords = [];
      updateScoreUI();

      currentMatchID = nextMatchID;

      seedPart = cyrb128(currentMatchID);
      seededRandom = sfc32(seedPart[0], seedPart[1], seedPart[2], seedPart[3]);

      isNavigating = false;
      document.getElementById('btn-next-round').innerHTML = "Prossimo ➔";
      document.getElementById('btn-next-round').style.opacity = "1";
      document.getElementById('round-badge').innerText = `Round ${currentRound}`;

      gamePhase = 'idle';
      document.getElementById('start-prompt').style.display = 'flex';
      avviaLobbyAttesa();
    });

    document.getElementById('btn-reset').addEventListener('click', () => {
      if (confirm("Sei sicuro di voler azzerare i punti e chiudere la partita?")) {
        sessionStorage.removeItem('cp_total_score');
        sessionStorage.removeItem('cp_round');
        const urlBase = window.location.protocol + "//" + window.location.host + window.location.pathname;
        window.location.href = urlBase; // Torna alla home pulita
      }
    });

    // ── RENDER LOOP ───────────────────────────────────────────────────────────
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    function animate() {
      requestAnimationFrame(animate);
      if (gamePhase === 'shaking') tickShaking();
      tickParticles();
      renderer.render(scene, camera);
    }

    initGrid();
    if (shouldStartLobbyOnLoad) {
      avviaLobbyAttesa();
    }
    animate();
  </script>
</body>

</html>
