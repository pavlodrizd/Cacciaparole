<!DOCTYPE html>
<html lang="it">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Cacciaparole</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Inter', sans-serif;
      background: #08091a;
      color: #fff;
      user-select: none;
      /* Previene lo zoom su input mobile */
      touch-action: none; 
    }

    /* Animated deep background */
    #bg-gradient {
      position: fixed;
      inset: 0;
      background: linear-gradient(135deg, #08091a 0%, #0f102e 40%, #0b1226 70%, #070818 100%);
      z-index: 0;
      pointer-events: none;
    }

    #bg-gradient::after {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 30%, rgba(80, 120, 255, 0.08) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 70%, rgba(150, 80, 255, 0.07) 0%, transparent 60%);
      animation: bgPulse 8s ease-in-out infinite alternate;
    }

    @keyframes bgPulse {
      from { opacity: 0.6; }
      to { opacity: 1; }
    }

    #canvas-container {
      position: fixed;
      inset: 0;
      z-index: 1;
    }

    /* ── UI TOP (Punteggi e Timer) ──────────────── */
    #top-bar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 20px;
      z-index: 40;
      pointer-events: none;
    }

    #game-stats {
      display: flex;
      flex-direction: column;
      gap: 4px;
      opacity: 0;
      transition: opacity 0.5s;
    }

    #game-stats.visible {
      opacity: 1;
    }

    .stat-badge {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 700;
      color: #aaccff;
    }

    #timer-display {
      font-size: clamp(30px, 7vw, 48px);
      font-weight: 900;
      letter-spacing: 2px;
      color: #fff;
      text-shadow: 0 2px 20px rgba(100, 180, 255, 0.5);
      display: none;
      transition: color 0.5s, text-shadow 0.5s;
    }

    #timer-display.warning {
      color: #ff5050;
      text-shadow: 0 2px 30px rgba(255, 80, 80, 0.8);
      animation: timerPulse 0.5s ease-in-out infinite alternate;
    }

    /* ── OVERLAYS (Countdown & Start) ──────────────── */
    #countdown-overlay {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 60;
      pointer-events: none;
    }

    #countdown-overlay.active { display: flex; }

    #countdown-num {
      font-size: clamp(120px, 30vw, 240px);
      font-weight: 900;
      color: #fff;
      text-shadow: 0 0 60px rgba(120, 180, 255, 0.9), 0 0 120px rgba(80, 140, 255, 0.5);
      opacity: 0;
      transform: scale(1.6);
      letter-spacing: -4px;
    }

    #start-prompt {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 30;
      pointer-events: all;
      cursor: pointer;
    }

    #start-prompt-inner {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      padding: 32px 40px;
      background: rgba(10, 12, 30, 0.75);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 24px;
      backdrop-filter: blur(16px);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.1);
      animation: promptFloat 3s ease-in-out infinite;
      text-align: center;
    }

    @keyframes promptFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    .prompt-dice { font-size: 52px; filter: drop-shadow(0 0 16px rgba(120, 180, 255, 0.6)); }
    .prompt-title { font-size: clamp(22px, 5vw, 34px); font-weight: 900; letter-spacing: -1px; }
    .prompt-sub { font-size: 14px; color: rgba(255, 255, 255, 0.6); }

    .btn-large {
      width: 100%;
      background: linear-gradient(135deg, #4f7df5 0%, #7b52f0 100%);
      border: none;
      color: #fff;
      border-radius: 14px;
      padding: 14px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(80, 120, 255, 0.35);
      transition: transform 0.1s, filter 0.2s;
      font-family: 'Inter', sans-serif;
    }
    .btn-large:active { transform: scale(0.95); }

    /* ── WORD INPUT BAR (Ottimizzata Mobile) ──────── */
    #word-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(8, 9, 26, 0.85);
      backdrop-filter: blur(20px);
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      padding: 12px 15px calc(12px + env(safe-area-inset-bottom));
      z-index: 50;
      display: none; /* Visibile solo in gioco */
      flex-direction: column;
      gap: 10px;
      transform: translateY(100%);
      transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    #word-bar.visible {
      display: flex;
      transform: translateY(0);
    }

    .word-input-container {
      display: flex;
      gap: 8px;
      width: 100%;
      max-width: 600px;
      margin: 0 auto;
      position: relative;
    }

    #word-input {
      flex: 1;
      background: rgba(255, 255, 255, 0.1);
      border: 2px solid rgba(255, 255, 255, 0.2);
      color: #fff;
      border-radius: 16px;
      padding: 14px 20px;
      font-size: 18px;
      font-weight: 700;
      text-transform: uppercase;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
    }

    #word-input:focus {
      border-color: #64a0ff;
      background: rgba(255, 255, 255, 0.15);
    }

    #word-input::placeholder {
      color: rgba(255, 255, 255, 0.3);
      text-transform: none;
      font-weight: 400;
    }

    #btn-submit {
      background: linear-gradient(135deg, #00c87a, #009e60);
      border: none;
      color: white;
      border-radius: 16px;
      padding: 0 24px;
      font-weight: 700;
      font-size: 16px;
      cursor: pointer;
      transition: transform 0.1s;
    }
    #btn-submit:active { transform: scale(0.9); }

    #pt-badge {
      position: absolute;
      top: -8px;
      right: 80px;
      background: #f5a623;
      color: #fff;
      font-size: 12px;
      font-weight: 900;
      border-radius: 20px;
      padding: 2px 8px;
      pointer-events: none;
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 0.2s, transform 0.2s;
    }
    #pt-badge.show { opacity: 1; transform: translateY(0); }

    /* Word Result Popup */
    #word-result {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0.8);
      padding: 15px 30px;
      border-radius: 50px;
      font-size: 20px;
      font-weight: 800;
      z-index: 55;
      white-space: nowrap;
      pointer-events: none;
      opacity: 0;
      transition: all 0.2s;
    }

    #word-result.show {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
    }
    #word-result.found { background: #00c87a; color: white; box-shadow: 0 10px 40px rgba(0,200,120,0.5); }
    #word-result.notfound { background: #e84040; color: white; box-shadow: 0 10px 40px rgba(232,64,64,0.5); }
    #word-result.duplicate { background: #f5a623; color: white; box-shadow: 0 10px 40px rgba(245,166,35,0.5); }

    /* ── REVIEW MODAL (Spoglio Parole) ────────────── */
    #review-modal {
      position: fixed;
      inset: 0;
      background: rgba(8, 9, 26, 0.95);
      backdrop-filter: blur(20px);
      z-index: 70;
      display: flex;
      flex-direction: column;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s;
    }

    #review-modal.active {
      opacity: 1;
      pointer-events: all;
    }

    .review-header {
      padding: 20px;
      text-align: center;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      padding-top: max(20px, env(safe-area-inset-top));
    }
    .review-header h2 { font-size: 24px; color: #fff; margin-bottom: 5px; }
    .review-header p { color: #aaccff; font-size: 14px; }

    .review-list {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .word-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      padding: 14px 20px;
      transition: background 0.2s, opacity 0.2s;
    }

    .word-item.crossed {
      opacity: 0.5;
      background: rgba(255, 80, 80, 0.1);
      border-color: rgba(255, 80, 80, 0.3);
    }

    .word-info { display: flex; align-items: center; gap: 15px; }
    .word-text { font-size: 18px; font-weight: 700; letter-spacing: 1px; }
    .word-item.crossed .word-text { text-decoration: line-through; color: #ff8888; }
    .word-pts { background: #4f7df5; border-radius: 10px; padding: 3px 10px; font-size: 12px; font-weight: 900; }
    .word-item.crossed .word-pts { background: #888; }

    .word-toggle {
      background: rgba(255,255,255,0.1);
      border: none;
      color: white;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }
    .word-item.crossed .word-toggle { background: #ff5050; }

    .review-footer {
      padding: 20px;
      background: #0b1226;
      border-top: 1px solid rgba(255,255,255,0.1);
      padding-bottom: max(20px, env(safe-area-inset-bottom));
    }
    .review-score {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 22px;
      font-weight: 900;
      margin-bottom: 20px;
    }
    .review-score span { color: #00c87a; font-size: 28px; }

    .action-buttons {
      display: flex;
      gap: 10px;
    }
    .btn-outline {
      flex: 1;
      background: transparent;
      border: 2px solid rgba(255,255,255,0.2);
      color: #fff;
      border-radius: 14px;
      padding: 14px;
      font-weight: 600;
      font-size: 15px;
      cursor: pointer;
    }
    .btn-next {
      flex: 2;
      background: linear-gradient(135deg, #00c87a, #009e60);
      border: none;
      color: #fff;
      border-radius: 14px;
      padding: 14px;
      font-weight: 700;
      font-size: 16px;
      cursor: pointer;
    }

  </style>
</head>

<body>
  <div id="bg-gradient"></div>
  <div id="canvas-container"></div>

  <!-- UI Top In-Game -->
  <div id="top-bar">
    <div id="game-stats">
      <div class="stat-badge" id="round-badge">Round 1</div>
      <div class="stat-badge" id="total-score-badge">Totale: 0 pt</div>
    </div>
    <div id="timer-display">03:00</div>
  </div>

  <!-- 3-2-1 countdown -->
  <div id="countdown-overlay">
    <span id="countdown-num"></span>
  </div>

  <!-- Start prompt (Lobby) -->
  <div id="start-prompt">
    <div id="start-prompt-inner">
      <div class="prompt-dice">🎲</div>
      <div class="prompt-title">Cacciaparole</div>
      <div class="prompt-sub" id="lobby-status">Invia il link o inizia da solo</div>
      
      <button id="btn-start-solo" class="btn-large" style="margin-top: 15px;">
        👤 Gioca da Solo
      </button>
      <button id="btn-challenge" class="btn-large" style="margin-top: 10px; background: linear-gradient(135deg, #f5a623, #d35400);">
        🤝 Crea Sfida Multiplayer
      </button>
    </div>
  </div>

  <!-- Word Input Bar -->
  <div id="word-bar">
    <div style="display:flex; justify-content:space-between; font-size:12px; font-weight:700; color:#aaccff; padding: 0 5px;">
      <span id="words-found-counter">Parole trovate: 0</span>
      <span id="current-pts-counter">Punti stimati: 0</span>
    </div>
    <div class="word-input-container">
      <input id="word-input" type="text" placeholder="Scrivi parola..." autocomplete="off" autocorrect="off" spellcheck="false" />
      <span id="pt-badge"></span>
      <button id="btn-submit">➔</button>
    </div>
  </div>

  <!-- Popup Esito Parola -->
  <div id="word-result"></div>

  <!-- Review Modal (Spoglio) -->
  <div id="review-modal">
    <div class="review-header">
      <h2>Spoglio Parole</h2>
      <p>Confrontati a voce e barra le parole uguali</p>
    </div>
    
    <div class="review-list" id="review-list">
      <!-- Generato via JS -->
    </div>

    <div class="review-footer">
      <div class="review-score">
        Punti Round: <span id="final-round-score">0</span>
      </div>
      <div class="action-buttons">
        <button class="btn-outline" id="btn-reset">Azzera Tutto</button>
        <button class="btn-next" id="btn-next-round">Prossimo Round ➔</button>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script>
    /* ═══════════════════════════════════════════════════════
       Cacciaparole — Mobile Premium Edition
       ═══════════════════════════════════════════════════════ */

    // ── GAME STATE & SESSION ────────────────────────────────────────────────
    let currentRound = parseInt(sessionStorage.getItem('cp_round')) || 1;
    let totalGameScore = parseInt(sessionStorage.getItem('cp_total_score')) || 0;
    let foundWords = []; // Array: { text: "CIAO", pts: 2, crossed: false }
    
    document.getElementById('round-badge').innerText = `Round ${currentRound}`;
    document.getElementById('total-score-badge').innerText = `Totale: ${totalGameScore} pt`;

    // ── 50 DICE (Ottimizzati Italiano) ──────────────────────────────────────
    const DADI = [
      ["A", "E", "H", "I", "N", "S"], ["A", "H", "I", "L", "O", "R"], ["E", "H", "O", "P", "T", "U"],
      ["A", "E", "I", "QU", "R", "T"], ["A", "I", "O", "QU", "L", "N"],
      ["A", "E", "O", "Z", "C", "M"], ["E", "I", "U", "Z", "D", "R"], ["A", "I", "O", "Z", "S", "T"],
      ["A", "E", "I", "B", "L", "S"], ["A", "O", "U", "B", "N", "T"], ["E", "I", "O", "B", "C", "R"],
      ["A", "A", "E", "F", "M", "T"], ["E", "I", "U", "F", "N", "P"], ["A", "I", "O", "F", "R", "S"],
      ["A", "E", "I", "V", "D", "N"], ["E", "O", "U", "V", "L", "C"], ["A", "I", "O", "V", "R", "T"],
      ["A", "E", "I", "C", "R", "S"], ["A", "E", "O", "C", "L", "T"], ["E", "I", "O", "C", "N", "P"],
      ["A", "I", "U", "C", "M", "S"], ["A", "E", "I", "D", "R", "T"], ["A", "E", "O", "D", "L", "N"],
      ["E", "I", "O", "D", "S", "P"], ["A", "I", "U", "G", "R", "L"], ["A", "E", "O", "G", "N", "T"],
      ["E", "I", "O", "G", "S", "M"], ["A", "A", "E", "L", "N", "R"], ["E", "E", "I", "L", "S", "T"],
      ["I", "I", "O", "M", "R", "C"], ["O", "O", "U", "M", "S", "T"], ["A", "E", "I", "N", "P", "R"],
      ["A", "E", "O", "N", "S", "T"], ["E", "I", "O", "P", "L", "C"], ["A", "I", "U", "P", "R", "N"],
      ["A", "A", "E", "R", "S", "T"], ["E", "E", "I", "R", "L", "N"], ["I", "I", "O", "S", "T", "C"],
      ["O", "O", "A", "S", "L", "P"], ["U", "A", "E", "T", "N", "R"], ["A", "E", "I", "T", "S", "D"],
      ["A", "I", "O", "L", "R", "M"], ["E", "O", "U", "N", "S", "C"], ["A", "E", "E", "R", "T", "N"],
      ["E", "I", "I", "S", "L", "R"], ["I", "O", "O", "T", "N", "S"], ["A", "O", "U", "C", "R", "T"],
      ["A", "A", "I", "D", "L", "S"], ["E", "E", "O", "M", "N", "T"], ["A", "E", "I", "P", "S", "R"],
      ["E", "I", "O", "L", "T", "N"], ["A", "I", "U", "R", "S", "C"]
    ];

    // ── PRNG MULTIPLAYER & SHUFFLE ──────────────────────────────────────────
    function generateMatchID() { return Math.random().toString(36).substring(2, 10); }

    function cyrb128(str) {
        let h1 = 1779033703, h2 = 3144134277, h3 = 1013904242, h4 = 2773480762;
        for (let i = 0, k; i < str.length; i++) {
            k = str.charCodeAt(i);
            h1 = h2 ^ Math.imul(h1 ^ k, 597399067); h2 = h3 ^ Math.imul(h2 ^ k, 2869860233);
            h3 = h4 ^ Math.imul(h3 ^ k, 951274213); h4 = h1 ^ Math.imul(h4 ^ k, 2716044179);
        }
        h1 = Math.imul(h3 ^ (h1 >>> 18), 597399067); h2 = Math.imul(h4 ^ (h2 >>> 22), 2869860233);
        h3 = Math.imul(h1 ^ (h3 >>> 17), 951274213); h4 = Math.imul(h2 ^ (h4 >>> 19), 2716044179);
        return [(h1^h2^h3^h4)>>>0, (h2^h1)>>>0, (h3^h1)>>>0, (h4^h1)>>>0];
    }

    function sfc32(a, b, c, d) {
        return function() {
          a >>>= 0; b >>>= 0; c >>>= 0; d >>>= 0; 
          var t = (a + b | 0) + d | 0;
          d = d + 1 | 0; a = b ^ b >>> 9; b = c + (c << 3) | 0;
          c = c << 21 | c >>> 11; c = c + t | 0;
          return (t >>> 0) / 4294967296;
        }
    }

    let currentMatchID = generateMatchID();
    let scheduledStartTime = null;
    let waitingInterval = null;

    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.has('match')) {
      currentMatchID = urlParams.get('match');
      if (urlParams.has('start')) {
        scheduledStartTime = parseInt(urlParams.get('start'), 10);
        avviaLobbyAttesa();
      }
    }

    const seedPart = cyrb128(currentMatchID);
    const seededRandom = sfc32(seedPart[0], seedPart[1], seedPart[2], seedPart[3]);

    function shuffleArray(array) {
      const arr = [...array];
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(seededRandom() * (i + 1)); 
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    // ── GESTIONE AVVIO ────────────────────────────────────────────────────────
    document.getElementById('btn-challenge').addEventListener('click', (e) => {
      e.stopPropagation();
      const nuovoMatchID = generateMatchID(); 
      const tempoAttesa = 45000; // 45 sec per mandare il link
      const startTime = Date.now() + tempoAttesa; 
      
      const urlBase = window.location.protocol + "//" + window.location.host + window.location.pathname;
      const linkSfida = `${urlBase}?match=${nuovoMatchID}&start=${startTime}`;
      
      navigator.clipboard.writeText(linkSfida).then(() => {
        alert("Link copiato! Invialo al tuo avversario. La partita inizierà in 45 secondi.");
        window.location.href = linkSfida;
      }).catch(() => { alert("Copia questo link: " + linkSfida); });
    });

    document.getElementById('btn-start-solo').addEventListener('click', (e) => {
      e.stopPropagation();
      triggerStart();
    });

    function avviaLobbyAttesa() {
      document.getElementById('btn-challenge').style.display = 'none';
      document.getElementById('btn-start-solo').style.display = 'none';
      const subPrompt = document.getElementById('lobby-status');
      
      waitingInterval = setInterval(() => {
        const now = Date.now();
        const diff = scheduledStartTime - now;
        
        if (diff <= 0) {
          clearInterval(waitingInterval);
          subPrompt.innerHTML = "Avvio in corso!";
          triggerStart(); 
        } else {
          subPrompt.innerHTML = `Sincronizzazione in <strong style="color:#ff5050; font-size:1.3em;">${Math.ceil(diff / 1000)}</strong>s...<br><span style="font-size:10px;">(Tocca lo schermo per audio)</span>`;
        }
      }, 200);
    }

    // ── THREE.JS SETUP ────────────────────────────────────────────────────────
    const GRID = 5;
    const DSIZ = 1.05;
    const GAP = 1.38;
    const OX = -((GRID - 1) * GAP) / 2;
    const OZ = -((GRID - 1) * GAP) / 2;

    let gridLetters = [];
    let diceMeshes = [];
    let shakePositions = [];
    let shakeVelocities = [];
    let settledPositions = [];
    let timerInterval = null;
    let gamePhase = 'idle';
    let audioCtx = null;

    const scene = new THREE.Scene();
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    document.getElementById('canvas-container').appendChild(renderer.domElement);

    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 200);
    camera.position.set(0, 18, 16);
    camera.lookAt(0, 0, 0);

    function calcCameraY() {
      // Modificato per lasciare spazio alla UI in basso
      const fovRad = camera.fov * Math.PI / 180;
      const gridExtent = (GRID - 1) * GAP / 2 + DSIZ;
      const aspect = window.innerWidth / window.innerHeight;
      return Math.max(gridExtent / Math.tan(fovRad / 2) * 1.3, (gridExtent / aspect) / Math.tan(fovRad / 2) * 1.2);
    }

    scene.add(new THREE.AmbientLight(0xaac0ff, 0.65));
    const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
    dirLight.position.set(6, 18, 10);
    dirLight.castShadow = true;
    scene.add(dirLight);

    const ground = new THREE.Mesh(
      new THREE.PlaneGeometry(60, 60),
      new THREE.MeshStandardMaterial({ color: 0x08091a, roughness: 1 })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = -DSIZ / 2 - 0.02;
    scene.add(ground);

    const BOX_W = GRID * GAP + 1.2, BOX_H = 4.8, GLASS_OPACITY = 0.22;
    const glassMat = new THREE.MeshPhysicalMaterial({ color: 0xaaccff, transparent: true, opacity: GLASS_OPACITY, roughness: 0.04, side: THREE.DoubleSide, depthWrite: false });
    const glassGroup = new THREE.Group();
    scene.add(glassGroup);
    
    // Semplificato per performance
    function addPanel(w, h, d, px, py, pz) {
      const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), glassMat);
      m.position.set(px, py, pz); glassGroup.add(m);
    }
    const hw = BOX_W / 2 + 0.08, hy = BOX_H / 2 - 0.4;
    addPanel(BOX_W, BOX_H, 0.12, 0, hy, hw); addPanel(BOX_W, BOX_H, 0.12, 0, hy, -hw);
    addPanel(0.12, BOX_H, BOX_W, -hw, hy, 0); addPanel(0.12, BOX_H, BOX_W, hw, hy, 0);

    function makeLetterTex(letter) {
      const sz = 256, cv = document.createElement('canvas'), ctx = cv.getContext('2d');
      cv.width = cv.height = sz;
      ctx.fillStyle = '#f4efe4'; ctx.fillRect(0,0,sz,sz);
      ctx.fillStyle = '#1a1b2e'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.font = `bold ${letter === 'QU' ? 74 : 106}px Inter`;
      ctx.fillText(letter, sz/2, sz/2);
      return new THREE.CanvasTexture(cv);
    }

    const blankTex = (() => {
      const cv = document.createElement('canvas'); cv.width=cv.height=16;
      const ctx = cv.getContext('2d'); ctx.fillStyle='#ede8da'; ctx.fillRect(0,0,16,16);
      return new THREE.CanvasTexture(cv);
    })();

    function makeDiceMats(letter) {
      const mk = tex => new THREE.MeshStandardMaterial({ map: tex, roughness: 0.5 });
      return [mk(blankTex), mk(blankTex), mk(makeLetterTex(letter)), mk(blankTex), mk(blankTex), mk(blankTex)];
    }

    function initGrid() {
      const shuffled = shuffleArray(DADI);
      for (let i = 0; i < 25; i++) {
        const letter = shuffled[i][Math.floor(seededRandom() * shuffled[i].length)];
        gridLetters.push(letter);
        const mesh = new THREE.Mesh(new THREE.BoxGeometry(DSIZ, DSIZ, DSIZ), makeDiceMats(letter));
        mesh.castShadow = mesh.receiveShadow = true;
        const col = i % GRID, row = Math.floor(i / GRID);
        const settledPos = new THREE.Vector3(OX + col * GAP, 0, OZ + row * GAP);
        settledPositions.push(settledPos);
        mesh.position.copy(settledPos);
        shakePositions.push(new THREE.Vector3()); shakeVelocities.push(new THREE.Vector3());
        scene.add(mesh); diceMeshes.push(mesh);
      }
    }

    function rollNewLetters() {
      const shuffled = shuffleArray(DADI);
      for (let i = 0; i < 25; i++) {
        const letter = shuffled[i][Math.floor(seededRandom() * shuffled[i].length)];
        gridLetters[i] = letter;
        diceMeshes[i].material = makeDiceMats(letter);
      }
    }

    const BXYZ = (BOX_W - DSIZ * 1.6) / 2, BY_HI = BOX_H - DSIZ * 0.866 - 0.1, BY_LO = DSIZ * 0.866;
    function tickShaking(ts) {
      diceMeshes.forEach((mesh, i) => {
        const vel = shakeVelocities[i], pos = shakePositions[i];
        vel.y -= 0.01; // gravità
        pos.add(vel);
        if (pos.x > BXYZ || pos.x < -BXYZ) { vel.x *= -0.8; pos.x = pos.x > 0 ? BXYZ : -BXYZ; }
        if (pos.z > BXYZ || pos.z < -BXYZ) { vel.z *= -0.8; pos.z = pos.z > 0 ? BXYZ : -BXYZ; }
        if (pos.y > BY_HI || pos.y < BY_LO) { vel.y *= -0.8; pos.y = pos.y > 0 ? BY_HI : BY_LO; }
        mesh.position.copy(pos);
        mesh.rotation.x += vel.x; mesh.rotation.y += vel.y; mesh.rotation.z += vel.z;
      });
    }

    function settleAndZoom(onDone) {
      gamePhase = 'settling';
      diceMeshes.forEach((mesh, i) => {
        const t = settledPositions[i];
        const delay = 0.1 + Math.random() * 0.3;
        gsap.to(mesh.position, { x: t.x, z: t.z, duration: 0.8, ease: 'power2.inOut', delay: delay * 0.3 });
        gsap.to(mesh.position, { y: t.y, duration: 1.0, ease: 'bounce.out', delay: delay });
        gsap.to(mesh.rotation, { x: 0, y: 0, z: 0, duration: 0.9, ease: 'power2.out', delay: delay * 0.2 });
      });
      gsap.to(glassMat, { opacity: 0, duration: 0.9, delay: 0.3 });
      
      const topY = calcCameraY();
      gsap.to(camera.position, {
        x: 0, y: topY, z: 2, // Z leggermente spostato per visuale migliore
        duration: 1.8, ease: 'power3.inOut', delay: 0.7,
        onUpdate: () => camera.lookAt(0, 0, 1),
        onComplete: () => { gamePhase = 'playing'; if (onDone) onDone(); }
      });
    }

    // ── GAME LOGIC ────────────────────────────────────────────────────────────
    function triggerStart() {
      if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
      if (gamePhase !== 'idle') return;
      document.getElementById('start-prompt').style.display = 'none';

      rollNewLetters();
      for (let i = 0; i < 25; i++) {
        shakePositions[i].copy(diceMeshes[i].position);
        shakeVelocities[i].set((Math.random() - 0.5)*0.8, Math.random()*0.8+0.5, (Math.random() - 0.5)*0.8);
      }

      gamePhase = 'shaking';
      
      const countOverlay = document.getElementById('countdown-overlay');
      const countNum = document.getElementById('countdown-num');
      countOverlay.classList.add('active');
      
      let idx = 3;
      function step() {
        if (idx === 0) {
          countOverlay.classList.remove('active');
          playBeep(1046, 0.1, 0.5); setTimeout(()=>playBeep(1318, 0.2, 0.6), 100);
          settleAndZoom(startGameTimer);
          return;
        }
        playBeep(500 + idx*100, 0.1, 0.5);
        countNum.textContent = idx;
        gsap.fromTo(countNum, {opacity:0, scale:1.5}, {opacity:1, scale:1, duration:0.3, ease:'back.out'});
        setTimeout(() => gsap.to(countNum, {opacity:0, scale:0.5, duration:0.3}), 600);
        idx--;
        setTimeout(step, 1000);
      }
      step();
    }

    function startGameTimer() {
      document.getElementById('game-stats').classList.add('visible');
      const timerEl = document.getElementById('timer-display');
      timerEl.style.display = 'block';
      document.getElementById('word-bar').classList.add('visible');
      
      foundWords = [];
      updateScoreUI();

      const durata = 180;
      const endT = Date.now() + (durata * 1000);
      
      timerInterval = setInterval(() => {
        const left = Math.max(0, Math.ceil((endT - Date.now()) / 1000));
        timerEl.textContent = String(Math.floor(left/60)).padStart(2,'0')+':'+String(left%60).padStart(2,'0');

        if (left <= 3 && left > 0 && timerEl.dataset.sec !== String(left)) {
          timerEl.classList.add('warning');
          playBeep(1050, 0.1, 0.5);
          timerEl.dataset.sec = String(left);
        }

        if (left <= 0) {
          clearInterval(timerInterval);
          timerEl.textContent = 'STOP!';
          gamePhase = 'over';
          playBeep(880, 0.2); setTimeout(()=>playBeep(660, 0.2), 200); setTimeout(()=>playBeep(440, 1), 400);
          document.getElementById('word-bar').classList.remove('visible');
          
          setTimeout(showReviewModal, 1500); // Mostra lo spoglio dopo 1.5s
        }
      }, 200);
    }

    // ── AUDIO & HAPTICS ───────────────────────────────────────────────────────
    function getACtx() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); return audioCtx; }
    function playBeep(f=880, d=0.1, g=0.4) {
      try {
        const c = getACtx(), o = c.createOscillator(), gn = c.createGain();
        o.connect(gn); gn.connect(c.destination);
        o.type = 'sine'; o.frequency.value = f;
        gn.gain.setValueAtTime(g, c.currentTime);
        gn.gain.exponentialRampToValueAtTime(0.001, c.currentTime + d);
        o.start(); o.stop(c.currentTime + d);
      } catch (e) {}
    }
    function vibrate(ms) { if (navigator.vibrate) navigator.vibrate(ms); }

    // ── WORD VALIDATION ───────────────────────────────────────────────────────
    function tokenize(word) {
      const up = word.toUpperCase().replace(/\s/g, '');
      const tk = []; let i = 0;
      while (i < up.length) {
        if (up.substr(i, 2) === 'QU') { tk.push('QU'); i += 2; }
        else { tk.push(up[i]); i++; }
      }
      return tk;
    }

    function findWord(word) {
      const tk = tokenize(word);
      if (tk.length < 2) return null;
      const gl = gridLetters.map(l => l.toUpperCase());

      function dfs(ti, ci, vis) {
        if (ti === tk.length) return vis.slice();
        const r = Math.floor(ci / GRID), c = ci % GRID;
        for (let dr = -1; dr <= 1; dr++) for (let dc = -1; dc <= 1; dc++) {
          if (!dr && !dc) continue;
          const nr = r + dr, nc = c + dc;
          if (nr < 0 || nr >= GRID || nc < 0 || nc >= GRID) continue;
          const ni = nr * GRID + nc;
          if (vis.includes(ni)) continue;
          if (gl[ni] === tk[ti]) { vis.push(ni); const res = dfs(ti+1, ni, vis); if(res) return res; vis.pop(); }
        }
        return null;
      }
      for (let s = 0; s < 25; s++) if (gl[s] === tk[0]) { const p = dfs(1, s, [s]); if (p) return p; }
      return null;
    }

    function wordPoints(tkLen) {
      if (tkLen < 4) return 0;
      if (tkLen === 4) return 1;
      if (tkLen === 5) return 2;
      if (tkLen === 6) return 3;
      if (tkLen === 7) return 5;
      return 11;
    }

    // ── INPUT HANDLING ────────────────────────────────────────────────────────
    const wordInput = document.getElementById('word-input');
    const ptBadge = document.getElementById('pt-badge');
    const resPopup = document.getElementById('word-result');
    let resTimer = null;

    wordInput.addEventListener('input', () => {
      const tk = tokenize(wordInput.value);
      const pts = wordPoints(tk.length);
      if (pts > 0) {
        ptBadge.textContent = '+' + pts;
        ptBadge.className = 'show';
      } else {
        ptBadge.className = '';
      }
    });

    function showPopup(type, text) {
      clearTimeout(resTimer);
      resPopup.textContent = text;
      resPopup.className = `show ${type}`;
      resTimer = setTimeout(() => resPopup.className = '', 1500);
    }

    function submitWord() {
      const rawWord = wordInput.value.trim().toUpperCase();
      if (!rawWord) return;
      
      const tk = tokenize(rawWord);
      if (tk.length < 4) {
        showPopup('notfound', 'Minimo 4 lettere!');
        vibrate(200);
        return;
      }

      if (foundWords.some(w => w.text === rawWord)) {
        showPopup('duplicate', 'GIÀ TROVATA!');
        wordInput.value = ''; ptBadge.className = '';
        vibrate([50, 50, 50]);
        return;
      }

      const path = findWord(rawWord);
      if (path) {
        const pts = wordPoints(tk.length);
        foundWords.push({ text: rawWord, pts: pts, crossed: false });
        updateScoreUI();
        showPopup('found', `+${pts} PT`);
        wordInput.value = ''; ptBadge.className = '';
        playBeep(1200, 0.1, 0.3);
        
        // Animazione Dadi
        path.forEach((idx, i) => {
          const mat = diceMeshes[idx].material;
          mat.forEach(m => m.color.setHex(0x00c87a));
          setTimeout(() => mat.forEach(m => m.color.setHex(0xf4efe4)), 800);
          gsap.to(diceMeshes[idx].position, {y: 0.5, duration: 0.1, yoyo:true, repeat:1, delay: i*0.05});
        });
      } else {
        showPopup('notfound', 'NON PRESENTE!');
        vibrate(200);
      }
      
      wordInput.focus();
    }

    document.getElementById('btn-submit').addEventListener('click', submitWord);
    wordInput.addEventListener('keydown', e => { if (e.key === 'Enter') submitWord(); });

    function updateScoreUI() {
      let pts = foundWords.filter(w => !w.crossed).reduce((sum, w) => sum + w.pts, 0);
      document.getElementById('words-found-counter').textContent = `Parole: ${foundWords.length}`;
      document.getElementById('current-pts-counter').textContent = `Punti: ${pts}`;
    }

    // ── REVIEW MODAL LOGIC ────────────────────────────────────────────────────
    function showReviewModal() {
      const modal = document.getElementById('review-modal');
      const list = document.getElementById('review-list');
      list.innerHTML = '';

      // Ordina parole: prima le più lunghe, poi alfabetico
      foundWords.sort((a,b) => b.pts - a.pts || a.text.localeCompare(b.text));

      foundWords.forEach((w, index) => {
        const div = document.createElement('div');
        div.className = 'word-item';
        div.innerHTML = `
          <div class="word-info">
            <span class="word-pts">${w.pts}</span>
            <span class="word-text">${w.text}</span>
          </div>
          <button class="word-toggle">${w.crossed ? '❌' : '👁️'}</button>
        `;
        
        div.querySelector('.word-toggle').addEventListener('click', () => {
          w.crossed = !w.crossed;
          div.className = w.crossed ? 'word-item crossed' : 'word-item';
          div.querySelector('.word-toggle').textContent = w.crossed ? '❌' : '👁️';
          vibrate(50);
          calcFinalRoundScore();
        });
        
        list.appendChild(div);
      });

      calcFinalRoundScore();
      modal.classList.add('active');
    }

    function calcFinalRoundScore() {
      const score = foundWords.filter(w => !w.crossed).reduce((s, w) => s + w.pts, 0);
      document.getElementById('final-round-score').textContent = score;
      return score;
    }

    // ── NEXT ROUND & RESET DETERMINISTICI ─────────────────────────────────────
    document.getElementById('btn-next-round').addEventListener('click', () => {
      const roundScore = calcFinalRoundScore();
      totalGameScore += roundScore;
      currentRound++;
      
      sessionStorage.setItem('cp_total_score', totalGameScore);
      sessionStorage.setItem('cp_round', currentRound);

      // Genera il link per il prossimo round deterministicamente!
      // Se entrambi i giocatori cliccano "Prossimo", genereranno lo stesso URL.
      const nextSeedStr = currentMatchID + "_round_" + currentRound;
      const nextMatchID = Math.abs(cyrb128(nextSeedStr)[0]).toString(36);
      
      const startTime = Date.now() + 15000; // 15 secondi per sincronizzarsi al round successivo
      
      const urlBase = window.location.protocol + "//" + window.location.host + window.location.pathname;
      window.location.href = `${urlBase}?match=${nextMatchID}&start=${startTime}`;
    });

    document.getElementById('btn-reset').addEventListener('click', () => {
      if(confirm("Sei sicuro di voler azzerare i punti e chiudere la partita?")) {
        sessionStorage.removeItem('cp_total_score');
        sessionStorage.removeItem('cp_round');
        const urlBase = window.location.protocol + "//" + window.location.host + window.location.pathname;
        window.location.href = urlBase; // Torna alla home pulita
      }
    });

    // ── RENDER LOOP ───────────────────────────────────────────────────────────
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    function animate() {
      requestAnimationFrame(animate);
      if (gamePhase === 'shaking') tickShaking();
      renderer.render(scene, camera);
    }

    initGrid();
    animate();
  </script>
</body>
